<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Stardust - космические знакомства">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Stardust">
  <link rel="apple-touch-icon" href="icons/icon.png">

  <link rel="icon" type="image/png" href="icons/icon.png"/>

  <title>Stardust - Знакомства</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>
  
  <script>
    window.addEventListener('error', function(e) { console.error('Error:', e.message); });
    window.addEventListener('unhandledrejection', function(e) { console.error('Rejection:', e.reason); });
  </script>
  
  <script src="firebase-config.js"></script>
  
  <script>
    try {
      if (typeof firebase !== 'undefined') {
        firebase.initializeApp(firebaseConfig);
        console.log('Firebase initialized');
      }
    } catch (e) { console.error('Firebase error:', e); }
  </script>
</head>
<body>
  <div id="loading" style="margin:0;background:#0F0F1A;display:flex;justify-content:center;align-items:center;height:100vh;color:white;font-family:sans-serif;flex-direction:column;">
    <div style="width:50px;height:50px;border:3px solid #333;border-top-color:#6C63FF;border-radius:50%;animation:spin 1s linear infinite;"></div>
    <div style="margin-top:20px;color:#888;">Загрузка...</div>
  </div>
  <div id="error" style="display:none;padding:20px;text-align:center;background:#0F0F1A;min-height:100vh;color:white;">
    <h2 style="color:#ff6b6b;">Ошибка</h2>
    <pre id="error-message" style="background:#222;padding:10px;overflow:auto;max-width:90vw;text-align:left;"></pre>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  <script>
    window.addEventListener('error', function(e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error-message').textContent = e.message + '\n' + e.filename + ':' + e.lineno;
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
